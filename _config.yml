# Chirpy configuration for Senthil Siva
# https://github.com/cotes2020/jekyll-theme-chirpy

theme: jekyll-theme-chirpy

lang: en
timezone: Asia/Kolkata   # adjust if needed

# Site identity
title: Senthil Siva
tagline: Technical writings on authorization, security, and systems
description: >-
  Technical writings on authorization, security, AI agents, Rust, and systems.
  By Senthil Siva.

url: "https://www.senthilsiva.com"
baseurl: ""

# Default social-share (Open Graph) image used for pages/posts without their own `image:`
social_preview_image: /assets/img/og-default.png

github:
  username: senthil1216

social:
  name: Senthil Siva
  email: mail@senthilsiva.com
  links:
    - https://github.com/senthil1216
    - https://www.linkedin.com/in/senthil-siva-065a258

# Theme
toc: true
theme_mode:   # empty = follow system + toggle available

# Analytics (add later if desired)
analytics:
  google:
    id:
  goatcounter:
    id: senthilsiva

# Comments via Giscus (GitHub Discussions)
# Setup instructions:
# 1. Enable Discussions on your GitHub repo (Settings → General → Features)
# 2. Visit https://giscus.app/ and select your repo: senthil1216/senthilsiva.github.io
# 3. Choose or create a category (e.g. "Blog Comments")
# 4. Copy the repo_id and category_id below
comments:
  provider: giscus
  giscus:
    repo: senthil1216/senthilsiva.github.io
    repo_id:          # e.g. R_kgDO... — get from https://giscus.app
    category: Blog Comments
    category_id:      # e.g. DIC_kwDO... — get from https://giscus.app
    mapping: pathname
    strict: 0
    reactions_enabled: 1
    input_position: bottom
    lang: en

# PWA (nice to have)
pwa:
  enabled: true
  cache:
    enabled: true

paginate: 10

# Kramdown / syntax
kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

# Collections for tabs (About, Archives, Tags, Categories)
collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/

# Note: Do not add a top-level `plugins:` list for jekyll-feed, jekyll-seo-tag, etc.
# Chirpy's theme gem (`jekyll-theme-chirpy`) already depends on and activates them.
# Adding them here without also listing the gems in Gemfile causes "cannot load such file" errors.
